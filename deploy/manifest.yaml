# Prompts Deployment Manifest
# Declares what gets symlinked where.
# deploy.sh reads this to create/verify symlinks.

user:
  target: "~/.claude"
  symlink:
    - CLAUDE.md
    - CX.md
    - settings.json
    - statusline.sh
    - commands/
    - rules/
    - rules-archive/
    - scripts/
    - skills/claude-health/
  skip:
    # Agent templates are a reference library, not deployed
    - agents/

lib:
  skills:
    bug-investigation:
      targets: [zdpos_dev, ccas]
    software-architecture:
      targets: [zdpos_dev, ccas]
    git-smart-commit:
      targets: [zdpos_dev]

projects:
  zdpos_dev:
    target: "~/projects/zdpos_dev"
    managed: true
    symlink:
      - .claude/settings.local.json
      - .claude/agents/
      - .claude/rules/
      - .claude/docs/
      - .claude/skills/
      - CLAUDE.md
      - GEMINI.md
      - AGENTS.md
  zdpos-217:
    target: "~/projects/zdpos-217"
    managed: true
    # Whole shareable .claude/ surface is symlinked from projects/zdpos-217/.claude/
    # (rules/ hooks/ scripts/ docs/ agents/ commands/ skills/ manifests/ +
    #  settings.json statusline.sh memory.md .gitignore).
    # UNLIKE zdpos_dev, settings.local.json is NOT symlinked here: it stays a real
    # local file because it holds dhpk pluginConfigs.modules + project-specific perms.
    # Personal/runtime kept local & out of this repo:
    #   settings.local.json, artifacts/, cache/, worktrees/, .harness-profile
    symlink:
      - .claude/      # all items present under projects/zdpos-217/.claude/
  ccas:
    target: "~/projects/ccas"
    managed: self
    # Self-managed: only lib/ skills/commands are symlinked
    # Project's own .claude/ is in its own git repo
  docker_run:
    target: "~/projects/docker_run"
    managed: self
  line-bot:
    target: "~/projects/line-bot"
    managed: true
    symlink:
      - .claude/settings.local.json
      - CLAUDE.md
